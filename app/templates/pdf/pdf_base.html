<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<style>
  /* ---- Reset ---- */
  * { box-sizing: border-box; margin: 0; padding: 0; }

  /* ---- Page ---- */
  @page {
    size: letter;
    margin: 0.6in 0.65in;
  }

  body {
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    font-size: 10pt;
    color: #1a1a1a;
    background: #fff;
  }

  /* ---- Header ---- */
  .pdf-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    border-bottom: 3px solid #9B1C1C;
    padding-bottom: 10px;
    margin-bottom: 16px;
  }
  .shop-name {
    font-size: 18pt;
    font-weight: bold;
    color: #9B1C1C;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  .shop-tagline {
    font-size: 8pt;
    color: #555;
    margin-top: 2px;
  }
  .shop-contact {
    text-align: right;
    font-size: 8.5pt;
    color: #333;
    line-height: 1.6;
  }
  .doc-title-block {
    text-align: center;
    margin-bottom: 14px;
  }
  .doc-title {
    font-size: 14pt;
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #140608;
  }
  .doc-subtitle {
    font-size: 9pt;
    color: #666;
    margin-top: 2px;
  }

  /* ---- RO number badge ---- */
  .ro-badge {
    display: inline-block;
    background: #9B1C1C;
    color: #fff;
    font-size: 11pt;
    font-weight: bold;
    padding: 4px 14px;
    border-radius: 3px;
    margin-bottom: 14px;
  }

  /* ---- Info grids ---- */
  .info-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 14px;
  }
  .info-box {
    border: 1px solid #ddd;
    border-radius: 4px;
    padding: 8px 10px;
  }
  .info-box-title {
    font-size: 8pt;
    font-weight: bold;
    text-transform: uppercase;
    color: #9B1C1C;
    letter-spacing: 0.5px;
    border-bottom: 1px solid #eee;
    margin-bottom: 5px;
    padding-bottom: 3px;
  }
  .info-row {
    display: flex;
    gap: 4px;
    margin-bottom: 3px;
    font-size: 9pt;
  }
  .info-label {
    color: #666;
    min-width: 80px;
    flex-shrink: 0;
  }
  .info-value {
    font-weight: 500;
    color: #111;
  }

  /* ---- Section headings ---- */
  .section-heading {
    background: #1E0C0E;
    color: #E8C98A;
    font-size: 9pt;
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 4px 8px;
    margin-top: 12px;
    margin-bottom: 6px;
    border-radius: 2px;
  }

  /* ---- Narrative field ---- */
  .narrative-box {
    border: 1px solid #ddd;
    border-radius: 4px;
    min-height: 52px;
    padding: 6px 8px;
    font-size: 9.5pt;
    color: #111;
    margin-bottom: 10px;
    white-space: pre-wrap;
  }
  .narrative-lines {
    border: none;
    border-bottom: 1px solid #ccc;
    height: 22px;
    margin-bottom: 2px;
    display: block;
  }

  /* ---- Tables ---- */
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 9pt;
    margin-bottom: 6px;
  }
  th {
    background: #1E0C0E;
    color: #E8C98A;
    text-align: left;
    padding: 5px 8px;
    font-size: 8pt;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }
  th.right { text-align: right; }
  td {
    padding: 5px 8px;
    border-bottom: 1px solid #eee;
    vertical-align: top;
  }
  td.right { text-align: right; }
  tr:nth-child(even) td { background: #fafafa; }

  /* ---- Totals ---- */
  .totals-table { width: 260px; margin-left: auto; margin-bottom: 12px; }
  .totals-table td { border: none; padding: 3px 8px; }
  .totals-table .total-label { color: #555; }
  .totals-table .total-value { text-align: right; font-weight: 500; }
  .totals-table .grand-row td { font-size: 11pt; font-weight: bold; color: #9B1C1C; border-top: 2px solid #9B1C1C; }

  /* ---- Signature block ---- */
  .sig-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-top: 16px;
  }
  .sig-block { }
  .sig-label { font-size: 8.5pt; color: #555; margin-bottom: 2px; }
  .sig-line {
    border-bottom: 1px solid #333;
    height: 32px;
    margin-bottom: 4px;
  }
  .sig-sub-label { font-size: 7.5pt; color: #888; }

  /* ---- Waiver / body text ---- */
  .waiver-text {
    font-size: 9pt;
    line-height: 1.6;
    color: #222;
    margin-bottom: 12px;
  }
  .waiver-text p { margin-bottom: 8px; }

  /* ---- Footer ---- */
  .pdf-footer {
    position: running(footer);
    font-size: 7.5pt;
    color: #aaa;
    text-align: center;
    border-top: 1px solid #eee;
    padding-top: 4px;
  }
  @page { @bottom-center { content: element(footer); } }
</style>
</head>
<body>

{% block pdf_content %}{% endblock %}

<div class="pdf-footer">
  {{ shop_name }} &mdash; {{ shop_address }}{% if shop_phone %} &mdash; {{ shop_phone }}{% endif %} &mdash; RO: {% block footer_ro %}{% endblock %}
</div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Red Dirt UTV Performance</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}" />
</head>
<body class="login-body">
  <div class="login-card">
    <div class="login-logo">
      <span class="brand-icon-lg">⚙</span>
      <h1 class="login-title">Red Dirt UTV Performance</h1>
      <p class="login-sub">Shop Management System</p>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="flash flash-{{ category }}">{{ message }}</div>
      {% endfor %}
    {% endwith %}

    <form method="POST" action="{{ url_for('auth.login') }}">
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input
          type="password"
          id="password"
          name="password"
          class="form-input"
          placeholder="Enter shop password"
          autofocus
          required
        />
      </div>
      <button type="submit" class="btn btn-primary btn-block">Enter Shop</button>
    </form>
  </div>
</body>
</html>
